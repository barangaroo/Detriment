name: Detriment
options:
  bundleIdPrefix: com.detriment
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Detriment scans your local network to discover connected devices and assess your network security."
    INFOPLIST_KEY_NSBonjourServices: "_tcp,_udp,_http._tcp,_https._tcp,_airplay._tcp,_raop._tcp,_smb._tcp,_rfb._tcp,_ssh._tcp,_ipp._tcp,_printer._tcp,_scanner._tcp,_companion-link._tcp,_homekit._tcp,_hap._tcp"

targets:
  Detriment:
    type: application
    platform: iOS
    sources:
      - Detriment
    dependencies:
      - target: DetrimentWidgetExtension
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Detriment/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.detriment.app
        INFOPLIST_KEY_CFBundleDisplayName: "Detriment"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIBackgroundModes: "fetch"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: Detriment/Detriment.entitlements

  DetrimentWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - DetrimentWidget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.detriment.app.widget
        INFOPLIST_KEY_CFBundleDisplayName: "Detriment Widget"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: DetrimentWidget/DetrimentWidgetExtension.entitlements
